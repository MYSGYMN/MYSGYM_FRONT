<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MYSGYM{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script src="{{ url_for('static', filename='js/config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</head>
<body>
    <header class="topbar">
        <a class="topbar-brand" href="{{ url_for('home') }}">MYSGYM</a>
        <nav class="topbar-nav">
            <a class="{% if active_page == 'home' %}active{% endif %}" href="{{ url_for('home') }}">Resumen</a>
            {% for item in nav_items %}
                <a class="{% if active_page == item.key %}active{% endif %}" href="{{ item.url }}">{{ item.title }}</a>
                {% endfor %}
                <a id="auth-link" href="/login">Login</a>
        </nav>
    </header>

    <main class="page">
        {% block body %}{% endblock %}
    </main>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const authLink = document.getElementById('auth-link');
        const token = ApiService.getToken && ApiService.getToken();
        if (token) {
            authLink.textContent = 'Logout';
            authLink.href = '#';
            authLink.addEventListener('click', (e) => { e.preventDefault(); ApiService.logout(); });
        } else {
            authLink.textContent = 'Login';
            authLink.href = '/login';
        }

        // Protege rutas del frontend: redirige a /login si no hay token
        const path = window.location.pathname;
        const isProtected = (path === '/' || path.startsWith('/dashboard') || path.startsWith('/seccion'));
        if (isProtected && !token && path !== '/login') {
            window.location.href = '/login';
        }

        // Intercepta clicks en la nav: si no hay token, redirige a /login
        const navLinks = document.querySelectorAll('.topbar-nav a');
        navLinks.forEach((link) => {
            // compute link path relative to origin
            try {
                const linkPath = new URL(link.href, window.location.origin).pathname;
                // mark active if matches current path
                if (linkPath === path || (linkPath !== '/' && path.startsWith(linkPath))) {
                    link.classList.add('active');
                }
            } catch (e) {
                // ignore invalid hrefs
            }

            link.addEventListener('click', (e) => {
                const href = link.getAttribute('href');
                if (!href) return;
                // Only protect internal routes
                if (href.startsWith('/') && href !== '/login' && !ApiService.getToken()) {
                    e.preventDefault();
                    window.location.href = '/login';
                }
            });
        });
    });
    </script>
</body>
</html>
